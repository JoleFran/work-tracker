<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #181818;
      --surface2: #222222;
      --border: #2e2e2e;
      --accent: #c8f060;
      --accent-dim: #a0c040;
      --text: #f0f0f0;
      --text-muted: #888;
      --text-dim: #555;
      --red: #ff5f5f;
      --yellow: #f0c060;
      --blue: #60b8f0;
      --radius: 6px;
      --mono: 'DM Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 0;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
    }

    .logo {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .logo span { color: var(--accent); }

    .date-badge {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 20px;
    }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      min-height: calc(100vh - 61px);
    }

    /* ── Left Panel ── */
    .left-panel {
      border-right: 1px solid var(--border);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .panel-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.7;
      padding: 14px;
      resize: vertical;
      min-height: 160px;
      transition: border-color 0.2s;
      outline: none;
    }

    textarea::placeholder { color: var(--text-dim); }
    textarea:focus { border-color: var(--accent); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: var(--radius);
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      letter-spacing: 0.2px;
    }

    .btn-primary {
      background: var(--accent);
      color: #0f0f0f;
      width: 100%;
      justify-content: center;
    }

    .btn-primary:hover { background: var(--accent-dim); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover { border-color: var(--text-muted); color: var(--text); }

    .btn-danger {
      background: transparent;
      color: var(--red);
      border: 1px solid #3a2020;
      font-size: 12px;
      padding: 6px 12px;
    }

    .btn-danger:hover { background: #2a1515; }

    /* ── Status indicator ── */
    .status-bar {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      min-height: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
    }

    .dot.active { background: var(--accent); animation: pulse 1.2s infinite; }
    .dot.error { background: var(--red); }
    .dot.success { background: var(--accent); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Right Panel ── */
    .right-panel {
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .right-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-title {
      font-size: 20px;
      font-weight: 700;
    }

    .task-count {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* ── Preview Table ── */
    .preview-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .preview-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .preview-label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 1.5px;
      color: var(--accent);
      text-transform: uppercase;
    }

    .preview-actions {
      display: flex;
      gap: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead tr {
      background: var(--surface2);
    }

    th {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 10px 12px;
      text-align: left;
      font-weight: 500;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }

    tr.new-row td:first-child {
      border-left: 2px solid var(--accent);
    }

    tr.update-row td:first-child {
      border-left: 2px solid var(--yellow);
    }

    td input[type="text"], td input[type="date"] {
      background: transparent;
      border: none;
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      width: 100%;
      outline: none;
      padding: 2px 0;
    }

    td input[type="text"]:focus,
    td input[type="date"]:focus {
      border-bottom: 1px solid var(--accent);
    }

    td input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.6);
      cursor: pointer;
    }

    td select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      border-radius: 4px;
      padding: 3px 6px;
      outline: none;
      cursor: pointer;
    }

    td select:focus { border-color: var(--accent); }

    /* ── Status chips ── */
    .chip {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
    }

    .chip-open { background: #1a2a1a; color: #80d080; border: 1px solid #2a4a2a; }
    .chip-inprogress { background: #1a2030; color: var(--blue); border: 1px solid #2a3a50; }
    .chip-blocked { background: #2a2010; color: var(--yellow); border: 1px solid #4a3a10; }
    .chip-complete { background: #1a1a2a; color: #a0a0f0; border: 1px solid #2a2a4a; }
    .chip-cancelled { background: #2a1a1a; color: var(--red); border: 1px solid #4a2a2a; }

    /* ── Sheet view ── */
    .sheet-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .sheet-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sheet-label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .empty-state {
      padding: 48px;
      text-align: center;
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 13px;
    }

    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: var(--mono);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
      z-index: 999;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      max-width: 320px;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.success { border-left: 3px solid var(--accent); }
    .toast.error { border-left: 3px solid var(--red); }

    /* ── Scrollable table wrapper ── */
    .table-scroll { overflow-x: auto; }

    /* ── Row tag ── */
    .row-tag {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 1px;
      padding: 1px 5px;
      border-radius: 3px;
      text-transform: uppercase;
    }

    .tag-new { background: #1e2e10; color: var(--accent); }
    .tag-update { background: #2e2800; color: var(--yellow); }

    .delete-row-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 3px;
      transition: color 0.15s;
    }

    .delete-row-btn:hover { color: var(--red); }
  </style>
</head>
<body>

<header>
  <div class="logo">work<span>.</span>tracker</div>
  <div class="date-badge" id="dateBadge"></div>
</header>

<div class="layout">

  <!-- LEFT: Input Panel -->
  <div class="left-panel">
    <div>
      <div class="panel-label">New Note</div>
      <textarea id="noteInput" placeholder="Type your notes here...&#10;&#10;e.g. Ping Jeffrey on priority score story. Waiting on Bhavana to send API doc by Thursday. NSS/CDS meeting — write summary."></textarea>
    </div>

    <button class="btn btn-primary" id="interpretBtn" onclick="interpretNote()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      Interpret Note
    </button>

    <div class="status-bar" id="statusBar">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">Ready</span>
    </div>

    <div>
      <div class="panel-label" style="margin-bottom:10px;">Quick Filters</div>
      <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" onclick="setFilter('all')">All</button>
        <button class="filter-btn" onclick="setFilter('Open')">Open</button>
        <button class="filter-btn" onclick="setFilter('In Progress')">In Progress</button>
        <button class="filter-btn" onclick="setFilter('Blocked')">Blocked</button>
        <button class="filter-btn" onclick="setFilter('Complete')">Complete</button>
        <button class="filter-btn" onclick="setFilter('Cancelled')">Cancelled</button>
      </div>
    </div>

    <button class="btn btn-ghost" onclick="loadSheet()" style="margin-top:auto;">
      ↻ Refresh Sheet
    </button>
  </div>

  <!-- RIGHT: Main Panel -->
  <div class="right-panel">

    <!-- Preview Section (hidden until interpret runs) -->
    <div class="preview-section" id="previewSection" style="display:none;">
      <div class="preview-header">
        <div class="preview-label">⚡ Review Before Writing</div>
        <div class="preview-actions">
          <button class="btn btn-danger" onclick="clearPreview()">Discard</button>
          <button class="btn btn-primary" id="writeBtn" onclick="writeToSheet()" style="width:auto;">
            Write to Sheet ↗
          </button>
        </div>
      </div>
      <div class="table-scroll">
        <table id="previewTable">
          <thead>
            <tr>
              <th></th>
              <th>Task</th>
              <th>Owner</th>
              <th>Due</th>
              <th>Project</th>
              <th>Status</th>
              <th>Priority</th>
              <th>Dependency</th>
              <th>Source</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="previewBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Sheet View -->
    <div class="sheet-section">
      <div class="sheet-header">
        <div class="sheet-label">Current Tasks</div>
        <div class="task-count" id="taskCount">— tasks</div>
      </div>
      <div class="table-scroll">
        <table id="sheetTable">
          <thead>
            <tr>
              <th>Task</th>
              <th>Owner</th>
              <th>Due</th>
              <th>Project</th>
              <th>Status</th>
              <th>Priority</th>
              <th>Dependency</th>
            </tr>
          </thead>
          <tbody id="sheetBody">
            <tr><td colspan="7" class="empty-state">Loading tasks...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJeBz9rwvQZuwlOCURyMk5Hhs0iL7GVle2bpY2NboVutJ2y9rqTc39aWpyOXo2uj2ssQ/exec";
  const PROXY = "https://corsproxy.io/?url=";

  let currentFilter = "all";
  let allTasks = [];
  let pendingTasks = [];

  // ── Date badge ──
  const now = new Date();
  const TODAY = now.toISOString().split("T")[0];
  document.getElementById("dateBadge").textContent = now.toLocaleDateString("en-US", {
    weekday: "short", month: "short", day: "numeric", year: "numeric"
  });

  // ── Status bar ──
  function setStatus(msg, state = "idle") {
    document.getElementById("statusText").textContent = msg;
    const dot = document.getElementById("statusDot");
    dot.className = "dot";
    if (state === "loading") dot.classList.add("active");
    if (state === "error") dot.classList.add("error");
    if (state === "success") dot.classList.add("success");
  }

  // ── Toast ──
  function showToast(msg, type = "success") {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.className = "toast", 3000);
  }

  // ── Load sheet ──
  async function loadSheet() {
    setStatus("Loading tasks...", "loading");
    try {
      const res = await fetch(PROXY + encodeURIComponent(SCRIPT_URL + "?t=" + Date.now()), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "read" })
      });
      const data = await res.json();
      allTasks = data.tasks || [];
      renderSheet();
      setStatus(`Loaded ${allTasks.length} tasks`, "success");
    } catch (err) {
      setStatus("Failed to load sheet", "error");
      showToast("Could not connect to sheet", "error");
    }
  }

  // ── Render sheet ──
  function renderSheet() {
    const body = document.getElementById("sheetBody");
    const filtered = currentFilter === "all"
      ? allTasks
      : allTasks.filter(t => t.Status === currentFilter);

    document.getElementById("taskCount").textContent = `${filtered.length} task${filtered.length !== 1 ? "s" : ""}`;

    if (filtered.length === 0) {
      body.innerHTML = `<tr><td colspan="7" class="empty-state">No tasks found.</td></tr>`;
      return;
    }

    body.innerHTML = filtered.map(t => {
      const due = t.Due ? new Date(t.Due + "T12:00:00").toLocaleDateString("en-US", { month: "numeric", day: "numeric", year: "numeric" }) : "—";
      const isOverdue = t.Due && t.Due < TODAY && t.Status !== "Complete" && t.Status !== "Cancelled";
      const rowStyle = isOverdue ? "background:#1f1010;" : "";
      return `<tr style="${rowStyle}">
        <td style="max-width:260px;">${t.Task || "—"}</td>
        <td>${t.Owner || "—"}</td>
        <td style="font-family:var(--mono);font-size:12px;color:${isOverdue ? 'var(--red)' : 'inherit'}">${due}</td>
        <td>${t.Project || "—"}</td>
        <td>${statusChip(t.Status)}</td>
        <td style="font-family:var(--mono);font-size:12px;">${t.Priority || "—"}</td>
        <td style="color:var(--text-muted);font-size:12px;">${t.Dependency || "—"}</td>
      </tr>`;
    }).join("");
  }

  function statusChip(status) {
    const map = {
      "Open": "chip-open",
      "In Progress": "chip-inprogress",
      "Blocked": "chip-blocked",
      "Complete": "chip-complete",
      "Cancelled": "chip-cancelled"
    };
    return `<span class="chip ${map[status] || ''}">${status || "—"}</span>`;
  }

  // ── Filter ──
  function setFilter(val) {
    currentFilter = val;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    event.target.classList.add("active");
    renderSheet();
  }

  // ── Interpret ──
  async function interpretNote() {
    const note = document.getElementById("noteInput").value.trim();
    if (!note) return showToast("Please enter a note first", "error");

    const btn = document.getElementById("interpretBtn");
    btn.disabled = true;
    setStatus("Interpreting note...", "loading");

    try {
      const res = await fetch(PROXY + encodeURIComponent(SCRIPT_URL + "?t=" + Date.now()), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "interpret", note, today: TODAY })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      pendingTasks = data.tasks || [];
      renderPreview(pendingTasks);
      setStatus(`Found ${pendingTasks.length} task${pendingTasks.length !== 1 ? "s" : ""} — review below`, "success");
    } catch (err) {
      setStatus("Interpretation failed", "error");
      showToast("Error: " + err.message, "error");
    } finally {
      btn.disabled = false;
    }
  }

  // ── Render preview ──
  function renderPreview(tasks) {
    const section = document.getElementById("previewSection");
    const body = document.getElementById("previewBody");
    section.style.display = "block";
    section.scrollIntoView({ behavior: "smooth", block: "start" });

    body.innerHTML = tasks.map((t, i) => {
      const tag = t.isUpdate
        ? `<span class="row-tag tag-update">update</span>`
        : `<span class="row-tag tag-new">new</span>`;

      return `<tr class="${t.isUpdate ? 'update-row' : 'new-row'}" id="preview-row-${i}">
        <td>${tag}</td>
        <td><input type="text" value="${esc(t.Task)}" onchange="updatePending(${i}, 'Task', this.value)" style="min-width:200px;" /></td>
        <td><input type="text" value="${esc(t.Owner)}" onchange="updatePending(${i}, 'Owner', this.value)" style="min-width:100px;" /></td>
        <td><input type="date" value="${esc(t.Due)}" onchange="updatePending(${i}, 'Due', this.value)" /></td>
        <td><input type="text" value="${esc(t.Project)}" onchange="updatePending(${i}, 'Project', this.value)" style="min-width:80px;" /></td>
        <td>
          <select onchange="updatePending(${i}, 'Status', this.value)">
            ${["Open","In Progress","Blocked","Complete","Cancelled"].map(s =>
              `<option value="${s}" ${t.Status === s ? "selected" : ""}>${s}</option>`
            ).join("")}
          </select>
        </td>
        <td>
          <select onchange="updatePending(${i}, 'Priority', this.value)">
            ${["High","Med","Low"].map(p =>
              `<option value="${p}" ${(t.Priority || "Med") === p ? "selected" : ""}>${p}</option>`
            ).join("")}
          </select>
        </td>
        <td><input type="text" value="${esc(t.Dependency)}" onchange="updatePending(${i}, 'Dependency', this.value)" style="min-width:140px;" /></td>
        <td><input type="text" value="${esc(t.Source)}" onchange="updatePending(${i}, 'Source', this.value)" style="min-width:100px;" /></td>
        <td><button class="delete-row-btn" onclick="removePreviewRow(${i})" title="Remove">×</button></td>
      </tr>`;
    }).join("");
  }

  function esc(val) {
    return (val || "").toString().replace(/"/g, "&quot;").replace(/</g, "&lt;");
  }

  function updatePending(i, field, value) {
    pendingTasks[i][field] = value;
  }

  function removePreviewRow(i) {
    pendingTasks.splice(i, 1);
    if (pendingTasks.length === 0) {
      clearPreview();
    } else {
      renderPreview(pendingTasks);
    }
  }

  function clearPreview() {
    document.getElementById("previewSection").style.display = "none";
    pendingTasks = [];
  }

  // ── Write to sheet ──
  async function writeToSheet() {
    if (pendingTasks.length === 0) return;
    const btn = document.getElementById("writeBtn");
    btn.disabled = true;
    setStatus("Writing to sheet...", "loading");

    try {
      const res = await fetch(PROXY + encodeURIComponent(SCRIPT_URL + "?t=" + Date.now()), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "write", tasks: pendingTasks })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      showToast(`${pendingTasks.length} task${pendingTasks.length !== 1 ? "s" : ""} written to sheet ✓`);
      clearPreview();
      document.getElementById("noteInput").value = "";
      setStatus("Done — sheet updated", "success");
      await loadSheet();
    } catch (err) {
      setStatus("Write failed", "error");
      showToast("Error: " + err.message, "error");
    } finally {
      btn.disabled = false;
    }
  }

  // ── Init ──
  loadSheet();
</script>
</body>
</html>
